name: tripspending
description: A mobile app for tracking trip expenses with receipt OCR.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  
  # Local Database
  sqflite: ^2.3.2
  path: ^1.8.3
  path_provider: ^2.1.2
  
  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  
  # OCR (On-device)
  google_mlkit_text_recognition: ^0.11.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # UI Components
  flutter_slidable: ^3.0.1
  fl_chart: ^0.66.2
  intl: ^0.19.0
  
  # File Export
  excel: ^4.0.3
  share_plus: ^7.2.1
  
  # Utils
  uuid: ^4.3.3
  permission_handler: ^11.3.0
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  # Uncomment and add assets when you have them:
  # assets:
  #   - assets/images/
  #   - assets/icons/
  
  # Uncomment and add custom fonts when you have them:
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700
